<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; }
  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .nm { font-family: var(--font-family-mono); font-size: 12px; font-weight: 700; }
  .hint { font-size: 11px; color: var(--color-text-muted); }
  .scale { display: grid; grid-template-columns: repeat(8, 1fr); gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--color-border-default); margin-bottom: 8px; }
  .sw { height: 62px; padding: 6px 7px; font-family: var(--font-family-mono); font-size: 9px; display: flex; flex-direction: column; justify-content: space-between; }
  .sw .step { font-weight: 700; font-size: 10px; }
  .sw .hex  { opacity: 0.7; font-size: 8.5px; }
</style></head>
<body>
  <div class="head"><span class="nm">mint · matching / success</span><span class="hint">매칭률 · 저장 완료 · 합격</span></div>
  <div class="scale">
    <div class="sw" style="background:#EEFBF6"><span class="step">50</span><span class="hex">EEFBF6</span></div>
    <div class="sw" style="background:#D6F4E8"><span class="step">100</span><span class="hex">D6F4E8</span></div>
    <div class="sw" style="background:#B0E9D3"><span class="step">200</span><span class="hex">B0E9D3</span></div>
    <div class="sw" style="background:#80D8B7"><span class="step">300</span><span class="hex">80D8B7</span></div>
    <div class="sw" style="background:#54C39B;color:#0e3a2a"><span class="step">400</span><span class="hex">54C39B</span></div>
    <div class="sw" style="background:#2FA980;color:#fff"><span class="step">500</span><span class="hex">2FA980</span></div>
    <div class="sw" style="background:#1F8865;color:#fff"><span class="step">600</span><span class="hex">1F8865</span></div>
    <div class="sw" style="background:#166A50;color:#fff"><span class="step">700</span><span class="hex">166A50</span></div>
  </div>
</body></html>
