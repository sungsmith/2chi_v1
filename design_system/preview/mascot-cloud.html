<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; }
  .row { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item .nm { font-family: var(--font-family-mono); font-size: 10px; color: var(--color-text-muted); letter-spacing: 0.06em; }
  .cloud {
    display: inline-block; position: relative;
    border-radius: 100% 100% 80% 80% / 110% 110% 60% 60%;
    border: 1.5px solid;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.04);
  }
  .cloud::before, .cloud::after { content: ""; position: absolute; width: 4px; height: 4px; background: var(--color-neutral-800); border-radius: 50%; }
  .blush { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 9px; height: 3px; border-bottom: 1.5px solid var(--color-neutral-800); border-radius: 0 0 8px 8px; }
  .sm { width: 36px; height: 28px; }
  .sm::before { left: 10px; top: 11px; } .sm::after { right: 10px; top: 11px; }
  .md { width: 56px; height: 44px; }
  .md::before { left: 16px; top: 18px; } .md::after { right: 16px; top: 18px; }
  .lg { width: 84px; height: 66px; }
  .lg::before { left: 24px; top: 28px; width: 6px; height: 6px; } .lg::after { right: 24px; top: 28px; width: 6px; height: 6px; }
  .lav  { background: var(--color-lavender-200); border-color: var(--color-lavender-300); }
  .mint { background: var(--color-mint-200);     border-color: var(--color-mint-300); }
  .pink { background: var(--color-pink-200);     border-color: var(--color-pink-300); }
  .peri { background: var(--color-primary-200);  border-color: var(--color-primary-300); }
</style></head>
<body>
  <div class="row">
    <div class="item"><span class="cloud lg lav"><span class="blush"></span></span><span class="nm">lavender · default</span></div>
    <div class="item"><span class="cloud md mint"><span class="blush"></span></span><span class="nm">mint</span></div>
    <div class="item"><span class="cloud md pink"><span class="blush"></span></span><span class="nm">pink</span></div>
    <div class="item"><span class="cloud md peri"><span class="blush"></span></span><span class="nm">periwinkle</span></div>
    <div class="item"><span class="cloud sm lav"></span><span class="nm">sm 36px</span></div>
  </div>
</body></html>
