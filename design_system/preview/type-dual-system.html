<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; }
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col   { padding: 18px 20px; border: 1px solid var(--color-border-default); border-radius: 14px; }
  .col.hand { background: var(--color-lavender-50); border-color: var(--color-lavender-200); }
  .tag { display: inline-flex; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 8px; }
  .tag.sans { background: var(--color-primary-50); color: var(--color-primary-700); }
  .tag.hand { background: var(--color-lavender-100); color: var(--color-lavender-600); }
  .nm    { font-size: 13px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 4px; }
  .meta  { font-family: var(--font-family-mono); font-size: 10px; color: var(--color-text-muted); margin-bottom: 12px; letter-spacing: 0.06em; }
  .sample-sans { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.3; color: var(--color-text-primary); }
  .sample-hand { font-family: var(--font-family-hand); font-size: 26px; line-height: 1.2; color: var(--color-primary-700); }
  .use   { font-size: 11px; color: var(--color-text-secondary); margin-top: 8px; line-height: 1.5; }
</style></head>
<body>
  <div class="split">
    <div class="col">
      <span class="tag sans">SANS</span>
      <div class="nm">Pretendard Variable</div>
      <div class="meta">UI · BUTTON · FORM · DATA</div>
      <div class="sample-sans">대시보드 · 자소서 · 지원 현황</div>
      <div class="use">정보 전달이 우선되는 모든 텍스트.</div>
    </div>
    <div class="col hand">
      <span class="tag hand">HAND</span>
      <div class="nm">MemomentKkukkukk</div>
      <div class="meta">TITLE · EMPTY · WELCOME</div>
      <div class="sample-hand">함께 정리해볼까요?</div>
      <div class="use">사용자에게 말을 거는 순간에만. 한 화면 1~2 곳.</div>
    </div>
  </div>
</body></html>
