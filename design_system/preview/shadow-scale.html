<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 26px 22px; background: var(--color-bg); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .cell { background: #fff; height: 90px; border-radius: 10px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; font-family: var(--font-family-mono); font-size: 10.5px; }
  .cell .nm { font-weight: 700; color: var(--color-text-primary); }
  .cell .use { color: var(--color-text-muted); font-size: 9.5px; margin-top: 2px; line-height: 1.4; }
  .none { box-shadow: none; border: 1px solid var(--color-border-default); }
  .soft { box-shadow: 0 1px 2px rgba(37,36,31,0.04), 0 1px 1px rgba(37,36,31,0.03); }
  .card { box-shadow: 0 2px 4px rgba(37,36,31,0.04), 0 8px 24px -10px rgba(37,36,31,0.08); }
  .floating { box-shadow: 0 6px 16px -4px rgba(37,36,31,0.10), 0 20px 40px -16px rgba(37,36,31,0.12); }
  .modal { box-shadow: 0 24px 60px -20px rgba(37,36,31,0.30), 0 8px 24px -10px rgba(37,36,31,0.15); }
</style></head>
<body>
  <div class="grid">
    <div class="cell none"><span class="nm">none</span><span class="use">flat inputs</span></div>
    <div class="cell soft"><span class="nm">soft</span><span class="use">인풋 · 작은 카드</span></div>
    <div class="cell card"><span class="nm">card</span><span class="use">대시보드</span></div>
    <div class="cell floating"><span class="nm">floating</span><span class="use">팝오버 · 드롭</span></div>
    <div class="cell modal"><span class="nm">modal</span><span class="use">모달 · 토스트</span></div>
  </div>
</body></html>
