<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; }
  .row { display: grid; grid-template-columns: 70px 1fr 220px; align-items: center; gap: 14px; padding: 4px 0; font-family: var(--font-family-mono); font-size: 11px; }
  .row .nm { color: var(--color-text-secondary); }
  .row .bar { background: var(--color-primary-200); height: 14px; border-radius: 3px; }
  .row .meta { color: var(--color-text-muted); font-size: 10.5px; }
  .row .meta b { color: var(--color-text-primary); font-weight: 600; }
</style></head>
<body>
  <div class="row"><span class="nm">space.1</span><span class="bar" style="width:4px"></span><span class="meta"><b>4</b></span></div>
  <div class="row"><span class="nm">space.2</span><span class="bar" style="width:8px"></span><span class="meta"><b>8</b></span></div>
  <div class="row"><span class="nm">space.3</span><span class="bar" style="width:12px"></span><span class="meta"><b>12</b></span></div>
  <div class="row"><span class="nm">space.4</span><span class="bar" style="width:16px"></span><span class="meta"><b>16</b> · 인풋 내부 패딩</span></div>
  <div class="row"><span class="nm">space.5</span><span class="bar" style="width:20px"></span><span class="meta"><b>20</b></span></div>
  <div class="row"><span class="nm">space.6</span><span class="bar" style="width:24px"></span><span class="meta"><b>24</b> · 카드 내부 패딩</span></div>
  <div class="row"><span class="nm">space.8</span><span class="bar" style="width:32px"></span><span class="meta"><b>32</b> · 섹션 간격</span></div>
  <div class="row"><span class="nm">space.10</span><span class="bar" style="width:40px"></span><span class="meta"><b>40</b></span></div>
  <div class="row"><span class="nm">space.12</span><span class="bar" style="width:48px"></span><span class="meta"><b>48</b> · 페이지 좌우</span></div>
  <div class="row"><span class="nm">space.16</span><span class="bar" style="width:64px"></span><span class="meta"><b>64</b> · 페이지 상하</span></div>
</body></html>
