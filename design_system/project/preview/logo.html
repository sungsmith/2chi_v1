<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; }
  .grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 12px; }
  .cell { border-radius: 14px; border: 1px solid var(--color-border-default); padding: 24px 18px; display: flex; align-items: center; justify-content: center; position: relative; min-height: 130px; }
  .cell .lbl { position: absolute; left: 12px; bottom: 8px; font-family: var(--font-family-mono); font-size: 9px; letter-spacing: 0.06em; color: var(--color-text-muted); }
  .cell.white { background: #fff; }
  .cell.cream { background: var(--color-bg); }
  .cell.dark  { background: var(--color-neutral-800); }
  .cell.dark .lbl { color: rgba(255,255,255,0.6); }
  .cell img { height: 110px; width: auto; display: block; }
  .cell.dark img { filter: brightness(0) invert(1); }
  .wordmark { display: inline-flex; align-items: flex-start; gap: 3px; font-family: var(--font-family-sans); font-weight: 800; font-size: 40px; letter-spacing: -0.04em; color: var(--color-text-primary); }
  .wordmark .star { color: var(--color-primary-500); font-size: 0.5em; line-height: 1; margin-top: 0.05em; }
  .wordmark .en   { font-size: 0.3em; color: var(--color-text-muted); font-weight: 500; margin-left: 4px; align-self: flex-end; }
</style></head>
<body>
  <div class="grid">
    <div class="cell white"><img src="../assets/logo.svg" alt=""><span class="lbl">PRIMARY MARK · ON LIGHT</span></div>
    <div class="cell cream"><img src="../assets/logo.svg" alt="" style="height:80px"><span class="lbl">ON CREAM #F8F8F4</span></div>
    <div class="cell dark"><img src="../assets/logo.svg" alt="" style="height:80px"><span class="lbl">ON DARK · NEUTRAL 800</span></div>
    <div class="cell white" style="grid-column: span 2"><span class="wordmark">이취<span class="star">*</span><span class="en">2chi</span></span><span class="lbl">WORDMARK · UI 24~32px</span></div>
    <div class="cell" style="background:var(--color-lavender-100);border-color:var(--color-lavender-200)"><img src="../assets/logo.svg" alt="" style="height:64px"><span class="lbl">ON LAVENDER 100</span></div>
  </div>
</body></html>
