<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .field-lbl { font-size: 12px; font-weight: 600; color: var(--color-text-secondary); }

  .tagbox {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    padding: 8px 10px; background: #fff;
    border: 1.5px solid var(--color-primary-500); border-radius: 10px;
    box-shadow: 0 0 0 3px rgba(100,113,224,0.20);
    min-height: 44px;
  }
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 4px 4px 10px; border-radius: 999px;
    background: var(--color-primary-50); color: var(--color-primary-700);
    border: 1px solid var(--color-primary-100);
    font-size: 12px; font-weight: 600;
  }
  .tag .x {
    width: 18px; height: 18px; border-radius: 50%;
    display: inline-grid; place-items: center;
    background: var(--color-primary-100); color: var(--color-primary-700);
    cursor: pointer; border: none;
  }
  .tag .x:hover { background: var(--color-primary-200); }
  .tag.gap     { background: var(--color-peach-50); color: var(--color-peach-400); border-color: var(--color-peach-100); }
  .tag.gap .x  { background: var(--color-peach-100); color: var(--color-peach-400); }
  .tag.match   { background: var(--color-mint-50); color: var(--color-mint-700); border-color: var(--color-mint-100); }
  .tag.match .x{ background: var(--color-mint-100); color: var(--color-mint-700); }

  .tagbox input { border: none; outline: none; flex: 1; min-width: 100px; font-size: 13px; background: transparent; padding: 4px; }
  .helper { font-size: 11.5px; color: var(--color-text-muted); }

  .sugg { display: flex; gap: 6px; flex-wrap: wrap; padding-left: 2px; }
  .sugg .pick {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px 4px 6px; border-radius: 999px;
    background: #fff; border: 1px dashed var(--color-border-strong);
    font-size: 11.5px; font-weight: 600; color: var(--color-text-secondary);
    cursor: pointer;
  }
  .sugg .pick:hover { border-color: var(--color-primary-300); color: var(--color-primary-700); background: var(--color-primary-50); border-style: solid; }
  .sugg .pick .plus { width: 14px; height: 14px; color: var(--color-text-muted); }
</style></head>
<body>
  <div class="stack">
    <span class="field-lbl">사용 기술 · 키워드</span>
    <div class="tagbox">
      <span class="tag match">PostgreSQL <button class="x" aria-label="제거"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></span>
      <span class="tag match">Redis <button class="x"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></span>
      <span class="tag">Spring Boot <button class="x"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></span>
      <span class="tag">JPA <button class="x"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></span>
      <input value="Kaf" placeholder="태그 추가…">
    </div>
    <div class="helper">Enter / 콤마(,)로 추가, Backspace로 마지막 태그 제거</div>
    <div class="sugg">
      <span class="pick"><svg class="plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Kafka</span>
      <span class="pick"><svg class="plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Kotlin</span>
      <span class="pick"><svg class="plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>K8s</span>
      <span class="pick"><svg class="plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Kibana</span>
    </div>
  </div>
</body></html>
