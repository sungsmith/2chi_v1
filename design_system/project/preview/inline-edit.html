<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; }
  .stage { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .lbl { font-family: var(--font-family-mono); font-size: 10px; color: var(--color-text-muted); letter-spacing: 0.06em; width: 96px; }

  /* RESTING — title with subtle hover edit hint */
  .title {
    font-family: var(--font-family-hand); font-size: 28px;
    line-height: 1.2; font-weight: 400; margin: 0;
    padding: 4px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 8px;
    cursor: text; color: var(--color-text-primary); border: 1px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .title:hover { background: var(--color-surface-soft); border-color: var(--color-border-default); }
  .title:hover .edit-cue { opacity: 1; }
  .title .edit-cue {
    opacity: 0; color: var(--color-text-muted); font-size: 12px;
    transition: opacity .12s; display: inline-flex;
  }

  /* EDITING — input visually matches the resting type */
  .title-input {
    font-family: var(--font-family-hand); font-size: 28px; line-height: 1.2; font-weight: 400;
    padding: 4px 8px; border-radius: 6px;
    background: #fff; border: 1px solid var(--color-primary-500);
    box-shadow: 0 0 0 3px rgba(100,113,224,0.20);
    color: var(--color-text-primary); outline: none;
    width: 100%; min-width: 240px;
  }
  .controls { display: inline-flex; gap: 6px; }
  .controls button {
    width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--color-border-strong);
    background: #fff; cursor: pointer; display: grid; place-items: center; color: var(--color-text-secondary);
  }
  .controls button.confirm { background: var(--color-primary-600); color: #fff; border-color: var(--color-primary-600); }
  .controls button:hover { background: var(--color-surface-soft); }
  .controls button.confirm:hover { background: var(--color-primary-700); }

  .hint { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-family-mono); font-size: 10.5px; color: var(--color-text-muted); }
  .kbd { display: inline-block; padding: 1px 6px; border: 1px solid var(--color-border-default); border-radius: 4px; font-size: 10px; color: var(--color-text-secondary); background: #fff; }
</style></head>
<body>
  <div class="stage">
    <div class="row">
      <span class="lbl">RESTING</span>
      <h2 class="title">
        카카오 X 결제·정산 백엔드
        <span class="edit-cue">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4z"/></svg>
        </span>
      </h2>
    </div>
    <div class="row">
      <span class="lbl">EDITING</span>
      <input class="title-input" value="카카오 X 결제·정산 백엔드 v2"/>
      <span class="controls">
        <button aria-label="취소">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </button>
        <button class="confirm" aria-label="저장">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </span>
    </div>
    <div class="row" style="padding-left:108px">
      <span class="hint">
        <span class="kbd">Enter</span> 저장
        <span class="kbd">Esc</span> 취소
      </span>
    </div>
  </div>
</body></html>
