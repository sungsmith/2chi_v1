<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; background: var(--color-bg); }
  .stage { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  .modal {
    background: #fff; border-radius: 16px;
    box-shadow: 0 12px 32px -8px rgba(37,36,31,0.18), 0 4px 12px -4px rgba(37,36,31,0.08);
    padding: 22px; display: flex; flex-direction: column; gap: 12px;
    border: 1px solid var(--color-border-default);
  }
  .modal .row-top { display: flex; gap: 12px; align-items: flex-start; }
  .modal .row-top .ico {
    width: 36px; height: 36px; border-radius: 10px; flex: 0 0 auto;
    display: grid; place-items: center;
  }
  .modal .row-top .ico.danger { background: var(--color-semantic-error-bg); color: var(--color-semantic-error); }
  .modal .row-top .ico.lav    { background: var(--color-lavender-50); color: var(--color-lavender-600); }
  .modal .ttl {
    font-family: var(--font-family-sans); font-size: 16px; font-weight: 700;
    letter-spacing: -0.01em; line-height: 1.35; margin: 0;
    color: var(--color-text-primary);
  }
  .modal .body {
    font-size: 13px; color: var(--color-text-secondary); line-height: 1.6;
    margin: 0; text-wrap: pretty;
  }
  .modal .actions { display: flex; gap: 6px; justify-content: flex-end; padding-top: 4px; }
  .btn { display: inline-flex; align-items: center; gap: 4px; height: 34px; padding: 0 14px; font-size: 13px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; font-family: inherit; font-weight: 600; }
  .btn.ghost  { background: transparent; color: var(--color-text-secondary); }
  .btn.ghost:hover { background: var(--color-surface-soft); }
  .btn.danger { background: var(--color-semantic-error); color: #fff; }
  .btn.primary{ background: var(--color-primary-600); color: #fff; }
  .btn.secondary { background: #fff; color: var(--color-text-primary); border-color: var(--color-border-strong); }
  .modal.success { align-items: center; text-align: center; gap: 12px; padding: 26px 22px 20px; }
  .modal.success .mascot {
    width: 64px; height: 64px;
    background-image: url("../assets/mascot-happy.png");
    background-size: contain; background-position: center; background-repeat: no-repeat;
  }
</style></head>
<body>
  <div class="stage">
    <!-- DESTRUCTIVE CONFIRM: no × close, only 취소 + 삭제 -->
    <div class="modal">
      <div class="row-top">
        <span class="ico danger">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </span>
        <div>
          <h3 class="ttl">자소서를 정말 삭제할까요?</h3>
          <p class="body" style="margin-top:6px">삭제한 자소서는 휴지통에서 <b>30일간</b> 보관 후 영구 삭제돼요. 복구는 휴지통에서 가능합니다.</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn ghost">취소</button>
        <button class="btn danger">삭제하기</button>
      </div>
    </div>

    <!-- SUCCESS: only one path forward, click-outside-to-dismiss replaces × -->
    <div class="modal success">
      <span class="mascot"></span>
      <h3 class="ttl">자소서가 저장됐어요</h3>
      <p class="body">언제든 다시 이어 쓸 수 있어요.<br>다른 공고에도 적용해볼까요?</p>
      <div class="actions" style="width:100%;justify-content:center;padding-top:4px">
        <button class="btn ghost">나중에</button>
        <button class="btn primary">다른 공고에 적용</button>
      </div>
    </div>
  </div>
</body></html>
