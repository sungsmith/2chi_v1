<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 22px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .chip { padding: 10px 18px; border-radius: 999px; border: 1.5px solid; font-size: 15px; font-weight: 700; background: #fff; }
  .chip:nth-child(1) { background: var(--color-primary-50);  border-color: var(--color-primary-200);  color: var(--color-primary-700); }
  .chip:nth-child(2) { background: var(--color-mint-50);     border-color: var(--color-mint-200);     color: var(--color-mint-700); }
  .chip:nth-child(3) { background: var(--color-lavender-50); border-color: var(--color-lavender-200); color: var(--color-lavender-600); }
  .chip:nth-child(4) { background: var(--color-pink-50);     border-color: var(--color-pink-200);     color: var(--color-pink-500); }
  .chip:nth-child(5) { background: var(--color-peach-50);    border-color: var(--color-peach-200);    color: var(--color-peach-400); }
  .chip:nth-child(6) { background: var(--color-yellow-50);   border-color: var(--color-yellow-200);   color: var(--color-yellow-400); }
  .chip:nth-child(7) { background: #fff;                     border-color: var(--color-border-strong); color: var(--color-text-primary); }
  .sub { text-align: center; font-size: 12px; color: var(--color-text-secondary); margin-top: 14px; line-height: 1.5; max-width: 50ch; margin-left: auto; margin-right: auto; }
</style></head>
<body>
  <div class="row">
    <span class="chip">정리</span>
    <span class="chip">연결</span>
    <span class="chip">안심</span>
    <span class="chip">준비</span>
    <span class="chip">성장</span>
    <span class="chip">맞춤</span>
    <span class="chip">검토</span>
  </div>
  <p class="sub">모든 디자인 결정은 위 7가지 키워드 중 <b>최소 2개</b>와 일치해야 합니다.</p>
</body></html>
