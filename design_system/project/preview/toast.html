<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; background: var(--color-bg); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .toast {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 12px 12px 14px;
    border-radius: 12px; background: #fff;
    border: 1px solid var(--color-border-default);
    box-shadow: 0 8px 20px -6px rgba(37,36,31,0.12), 0 2px 6px -2px rgba(37,36,31,0.06);
  }
  .toast .ico {
    width: 24px; height: 24px; border-radius: 50%;
    display: grid; place-items: center; color: #fff; flex: 0 0 auto; margin-top: 1px;
  }
  .toast .ico.s  { background: var(--color-semantic-success); }
  .toast .ico.e  { background: var(--color-semantic-error); }
  .toast .ico.ai { background: linear-gradient(135deg, var(--color-primary-500), var(--color-lavender-400)); }
  .toast .body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .toast .body .ttl  { font-size: 13.5px; font-weight: 700; color: var(--color-text-primary); }
  .toast .body .desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; text-wrap: pretty; }
  .toast .right { display: inline-flex; align-items: center; gap: 4px; flex: 0 0 auto; }
  .toast .action {
    font-size: 12px; font-weight: 700; background: var(--color-surface-soft);
    border: none; color: var(--color-text-primary);
    padding: 6px 10px; border-radius: 6px; cursor: pointer;
  }
  .toast .action:hover { background: var(--color-neutral-200); }
  .toast .close {
    background: none; border: none; cursor: pointer;
    color: var(--color-text-muted); width: 28px; height: 28px;
    border-radius: 6px; display: grid; place-items: center;
  }
  .toast .close:hover { background: var(--color-surface-soft); color: var(--color-text-primary); }
  .toast.success { border-color: var(--color-mint-100); }
  .toast.error   { border-color: var(--color-pink-100); }

  /* Tiny inline SVG icons */
  .x svg, .ico svg { display: block; }
</style></head>
<body>
  <div class="stack">
    <!-- Success: action button only (no ×). Toast auto-dismisses or is replaced. -->
    <div class="toast success">
      <span class="ico s">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </span>
      <div class="body">
        <span class="ttl">자소서가 저장됐어요</span>
        <span class="desc">다음에 이어 쓸 수 있어요.</span>
      </div>
      <div class="right">
        <button class="action">실행 취소</button>
      </div>
    </div>

    <!-- Error: action button + dismiss (× lives because retry isn't the only path) -->
    <div class="toast error">
      <span class="ico e">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </span>
      <div class="body">
        <span class="ttl">제출에 실패했어요</span>
        <span class="desc">잠시 연결이 끊겼어요. 잠시 후 다시 시도해주세요.</span>
      </div>
      <div class="right">
        <button class="action">다시 시도</button>
        <button class="close" aria-label="닫기">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- AI process: long-running info, dismissible. Body wraps cleanly. -->
    <div class="toast">
      <span class="ico ai">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3l1.6 4.6L18 9l-4.4 1.4L12 15l-1.6-4.6L6 9l4.4-1.4z"/></svg>
      </span>
      <div class="body">
        <span class="ttl">AI 초안을 만드는 중이에요</span>
        <span class="desc">이력 · 공고 · 기업분석을 한 번에 정리하고 있어요. 약 20초 정도 걸려요. 다른 작업을 계속하셔도 괜찮아요.</span>
      </div>
      <div class="right">
        <button class="close" aria-label="알림 닫기">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>
</body></html>
