<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw { height: 96px; padding: 8px 10px; }
  .sw .top { display: flex; justify-content: space-between; font-family: var(--font-family-mono); font-size: 9.5px; opacity: 0.85; }
  .sw .nm { font-family: var(--font-family-sans); font-weight: 700; font-size: 12px; margin-top: 28px; }
  .sw .use { font-family: var(--font-family-sans); font-size: 10px; line-height: 1.3; opacity: 0.78; margin-top: 2px; }
</style></head>
<body>
  <div class="grid">
    <div class="sw dark" style="background:#6471E0"><div class="top"><span>primary</span><span>500</span></div><div class="nm">Periwinkle</div><div class="use">기본 액션 · 링크</div></div>
    <div class="sw dark" style="background:#2FA980"><div class="top"><span>mint</span><span>500</span></div><div class="nm">Mint</div><div class="use">매칭 · 성공</div></div>
    <div class="sw dark" style="background:#8265DC"><div class="top"><span>lavender</span><span>500</span></div><div class="nm">Lavender</div><div class="use">AI · 분석</div></div>
    <div class="sw dark" style="background:#E96B91"><div class="top"><span>pink</span><span>400</span></div><div class="nm">Pink</div><div class="use">D-day · 강조</div></div>
    <div class="sw"      style="background:#FFA178"><div class="top"><span>peach</span><span>300</span></div><div class="nm" style="color:#7a3416">Peach</div><div class="use" style="color:#7a3416">갭 · 보완</div></div>
    <div class="sw"      style="background:#F5C947"><div class="top"><span>yellow</span><span>300</span></div><div class="nm" style="color:#705a0a">Yellow</div><div class="use" style="color:#705a0a">검토 필요</div></div>
  </div>
</body></html>
