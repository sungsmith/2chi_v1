<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 26px 28px; }
  .display { font-family: var(--font-family-hand); font-size: 56px; line-height: 1.1; font-weight: 400; color: var(--color-text-primary); letter-spacing: 0; }

  .meta b { color: var(--color-text-primary); font-weight: 600; }
</style></head>
<body>
  <div class="display">매번 다시 쓰지<br>않는 자소서.</div>

  <div class="meta">
    <span><b>Display</b> 48 / 56 · Hand · 400</span>
    <span><b>Page Title</b> 36 / 44 · Hand · 400</span>
  </div>
