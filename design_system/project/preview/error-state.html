<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; background: var(--color-bg); }
  .stage { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .state {
    background: #fff; border: 1px solid var(--color-border-default); border-radius: 16px;
    padding: 22px; display: flex; flex-direction: column; gap: 10px; align-items: center; text-align: center;
  }
  .state .ill {
    width: 36px; height: 36px; border-radius: 10px;
    display: grid; place-items: center;
    background: var(--color-surface-soft); color: var(--color-text-muted);
  }
  .state.err .ill { background: var(--color-semantic-error-bg); color: var(--color-semantic-error); }
  .state .code {
    font-family: var(--font-family-mono); font-size: 10px;
    color: var(--color-text-muted); letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .state .ttl {
    font-family: var(--font-family-sans); font-size: 16px; font-weight: 700;
    letter-spacing: -0.01em; line-height: 1.35; margin: 0; color: var(--color-text-primary);
  }
  .state .desc {
    font-size: 13px; color: var(--color-text-secondary); line-height: 1.6;
    margin: 0; max-width: 38ch; text-wrap: pretty;
  }
  .state .actions { display: flex; gap: 6px; margin-top: 4px; }
  .state .btn {
    display: inline-flex; align-items: center; gap: 4px;
    height: 34px; padding: 0 14px; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    border: 1px solid transparent;
  }
  .state .btn.primary { background: var(--color-primary-600); color: #fff; }
  .state .btn.ghost   { background: transparent; color: var(--color-text-secondary); border-color: var(--color-border-strong); }
</style></head>
<body>
  <div class="stage">
    <div class="state">
      <span class="ill">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <span class="code">404 · NOT FOUND</span>
      <h3 class="ttl">이 자소서는 더 이상 찾을 수 없어요</h3>
      <p class="desc">삭제됐거나, 휴지통의 보관 기간(30일)이 지났을 수 있어요.</p>
      <div class="actions">
        <button class="btn ghost">뒤로</button>
        <button class="btn primary">자소서 목록으로</button>
      </div>
    </div>
    <div class="state err">
      <span class="ill">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </span>
      <span class="code">500 · 잠시 연결이 끊겼어요</span>
      <h3 class="ttl">잠시 후 다시 시도해주세요</h3>
      <p class="desc">서버 응답이 지연되고 있어요. 작성 중이던 자소서는 임시 저장되어 있어요.</p>
      <div class="actions">
        <button class="btn ghost">상태 페이지</button>
        <button class="btn primary">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
          다시 시도
        </button>
      </div>
    </div>
  </div>
</body></html>
