<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 22px; }
  .stage { display: flex; flex-direction: column; gap: 16px; }
  .pager { display: flex; align-items: center; justify-content: space-between; }
  .pg-meta { font-size: 12px; color: var(--color-text-muted); }
  .pg-meta b { color: var(--color-text-primary); font-weight: 700; font-family: var(--font-family-mono); }
  .pg { display: inline-flex; gap: 4px; }
  .pg a {
    min-width: 30px; height: 30px; padding: 0 8px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 7px; font-family: var(--font-family-mono); font-size: 12px;
    color: var(--color-text-secondary); text-decoration: none; border-bottom: none;
    background: transparent; border: 1px solid transparent;
  }
  .pg a:hover { background: var(--color-surface-soft); color: var(--color-text-primary); }
  .pg a.active { background: var(--color-primary-600); color: #fff; font-weight: 700; }
  .pg a.disabled { color: var(--color-text-disabled); cursor: not-allowed; }
  .pg .ellipsis { color: var(--color-text-muted); padding: 0 4px; align-self: center; }

  .filter-bar { display: flex; gap: 6px; padding: 8px 10px; background: var(--color-surface-soft); border-radius: 10px; align-items: center; }
  .filter-bar .label { font-family: var(--font-family-mono); font-size: 10px; color: var(--color-text-muted); letter-spacing: 0.06em; }
  .filter-bar .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px 4px 10px; background: #fff; border-radius: 999px; border: 1px solid var(--color-border-default); font-size: 12px; font-weight: 600; color: var(--color-text-secondary); }
  .filter-bar .chip.active { background: var(--color-primary-50); color: var(--color-primary-700); border-color: var(--color-primary-200); }
  .filter-bar .chip .x { color: var(--color-text-muted); cursor: pointer; }
  .filter-bar .clear { margin-left: auto; font-size: 11px; color: var(--color-text-muted); border: none; background: none; cursor: pointer; }
</style></head>
<body>
  <div class="stage">
    <div class="filter-bar">
      <span class="label">FILTER</span>
      <span class="chip active">백엔드 <span class="x">×</span></span>
      <span class="chip active">진행중 <span class="x">×</span></span>
      <span class="chip">서류</span>
      <span class="chip">코테</span>
      <span class="chip">면접</span>
      <button class="clear">초기화</button>
    </div>
    <div class="pager">
      <span class="pg-meta">전체 <b>87</b>건 · <b>21–40</b> 보기</span>
      <nav class="pg">
        <a class="disabled" aria-disabled="true">‹</a>
        <a>1</a>
        <a class="active">2</a>
        <a>3</a>
        <a>4</a>
        <span class="ellipsis">…</span>
        <a>9</a>
        <a>›</a>
      </nav>
    </div>
  </div>
</body></html>
