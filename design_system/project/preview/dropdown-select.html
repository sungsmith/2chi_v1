<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; background: var(--color-bg); }
  .stage { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }

  .dropdown {
    background: #fff; border: 1px solid var(--color-border-default); border-radius: 12px;
    box-shadow: 0 12px 28px -8px rgba(37,36,31,0.14), 0 4px 8px -2px rgba(37,36,31,0.06);
    padding: 6px; min-width: 240px;
  }
  .dd-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 7px; font-size: 13px; cursor: pointer; color: var(--color-text-primary);
  }
  .dd-item:hover { background: var(--color-surface-soft); }
  .dd-item.active { background: var(--color-primary-50); color: var(--color-primary-700); font-weight: 700; }
  .dd-item .lico { width: 16px; height: 16px; color: var(--color-text-muted); flex: 0 0 auto; display: inline-flex; }
  .dd-item.active .lico { color: var(--color-primary-700); }
  .dd-item.danger { color: var(--color-semantic-error); }
  .dd-item.danger .lico { color: var(--color-semantic-error); }
  .dd-item .check { margin-left: auto; color: var(--color-primary-600); display: inline-flex; }
  .dd-divider { height: 1px; background: var(--color-border-subtle); margin: 4px 8px; }
  .dd-label {
    padding: 6px 10px 4px; font-family: var(--font-family-mono);
    font-size: 10px; letter-spacing: 0.08em; color: var(--color-text-muted); text-transform: uppercase;
  }

  .select {
    background: #fff; border: 1px solid var(--color-border-default); border-radius: 12px;
    box-shadow: 0 12px 28px -8px rgba(37,36,31,0.14), 0 4px 8px -2px rgba(37,36,31,0.06);
    padding: 0; min-width: 280px;
  }
  .sel-search { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--color-border-subtle); }
  .sel-search input { border: none; outline: none; flex: 1; font-family: inherit; font-size: 13px; background: transparent; }
  .sel-search .ico { color: var(--color-text-muted); display: inline-flex; }
  .sel-list { padding: 4px; max-height: 180px; overflow: auto; }
  .sel-list .opt { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 7px; font-size: 13px; cursor: pointer; }
  .sel-list .opt:hover { background: var(--color-surface-soft); }
  .sel-list .opt .av { width: 22px; height: 22px; border-radius: 50%; background: var(--color-primary-100); color: var(--color-primary-700); display: grid; place-items: center; font-size: 11px; font-weight: 700; }
  .sel-list .opt .meta { color: var(--color-text-muted); font-size: 11px; margin-left: auto; }
</style></head>
<body>
  <div class="stage">
    <div class="dropdown">
      <div class="dd-label">자소서 액션</div>
      <div class="dd-item">
        <span class="lico"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4z"/></svg></span>
        이름 변경
      </div>
      <div class="dd-item active">
        <span class="lico"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>
        복제해서 변형본 만들기
        <span class="check"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
      <div class="dd-item">
        <span class="lico"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>
        PDF 내보내기
      </div>
      <div class="dd-item">
        <span class="lico"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>
        Word 내보내기
      </div>
      <div class="dd-divider"></div>
      <div class="dd-item danger">
        <span class="lico"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg></span>
        휴지통으로 이동
      </div>
    </div>

    <div class="select">
      <div class="sel-search">
        <span class="ico"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input value="결제" placeholder="회사명 검색…">
      </div>
      <div class="sel-list">
        <div class="opt"><span class="av">테</span>(주)테크컴퍼니 <span class="meta">결제·정산</span></div>
        <div class="opt"><span class="av">카</span>카카오페이 <span class="meta">결제 플랫폼</span></div>
        <div class="opt"><span class="av">토</span>토스페이먼츠 <span class="meta">결제 인프라</span></div>
        <div class="opt"><span class="av">네</span>네이버페이 <span class="meta">간편결제</span></div>
      </div>
    </div>
  </div>
</body></html>
