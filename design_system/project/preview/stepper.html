<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; }
  .stack { display: flex; flex-direction: column; gap: 24px; }

  /* HORIZONTAL — used at top of multi-step flows */
  .step-h { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .step-h .pill { display: flex; flex-direction: column; gap: 6px; }
  .step-h .pill .bar { height: 4px; border-radius: 999px; background: var(--color-neutral-200); }
  .step-h .pill.done .bar   { background: var(--color-mint-500); }
  .step-h .pill.active .bar { background: var(--color-primary-500); }
  .step-h .pill .meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--color-text-muted); font-weight: 600; }
  .step-h .pill.active .meta { color: var(--color-text-primary); }
  .step-h .pill .num {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--color-neutral-200); color: var(--color-text-secondary);
    font-family: var(--font-family-mono); font-size: 11px; font-weight: 700;
    display: inline-grid; place-items: center;
  }
  .step-h .pill.active .num { background: var(--color-primary-500); color: #fff; }
  .step-h .pill.done .num   { background: var(--color-mint-500); color: #fff; }

  /* VERTICAL — used in sidebars */
  .step-v { display: flex; flex-direction: column; gap: 0; padding-left: 6px; }
  .step-v .item { display: grid; grid-template-columns: 28px 1fr; gap: 10px; align-items: flex-start; position: relative; padding: 6px 0 14px; }
  .step-v .item::before {
    content: ""; position: absolute; left: 13px; top: 30px; bottom: -6px;
    width: 2px; background: var(--color-neutral-200);
  }
  .step-v .item:last-child::before { display: none; }
  .step-v .item .dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--color-neutral-100); color: var(--color-text-secondary);
    font-family: var(--font-family-mono); font-size: 10px; font-weight: 700;
    display: grid; place-items: center;
    justify-self: center;
    border: 2px solid #fff; box-shadow: 0 0 0 1px var(--color-neutral-200);
    position: relative; z-index: 1;
  }
  .step-v .item.done .dot { background: var(--color-mint-500); color: #fff; box-shadow: 0 0 0 1px var(--color-mint-500); }
  .step-v .item.done::before { background: var(--color-mint-300); }
  .step-v .item.active .dot { background: var(--color-primary-600); color: #fff; box-shadow: 0 0 0 1px var(--color-primary-600); }
  .step-v .item .label { font-size: 13px; font-weight: 600; color: var(--color-text-primary); line-height: 1.4; }
  .step-v .item.muted .label { color: var(--color-text-muted); font-weight: 500; }
  .step-v .item .sub { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; display: block; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: flex-start; }
  .lbl { font-family: var(--font-family-mono); font-size: 10px; color: var(--color-text-muted); letter-spacing: 0.06em; margin-bottom: 12px; display: block; }
</style></head>
<body>
  <div class="row">
    <div>
      <span class="lbl">HORIZONTAL · 4 STEP</span>
      <div class="step-h">
        <div class="pill done"><div class="bar"></div><div class="meta"><span class="num"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></span><span>준비 단계</span></div></div>
        <div class="pill active"><div class="bar"></div><div class="meta"><span class="num">2</span><span>경력 연차</span></div></div>
        <div class="pill"><div class="bar"></div><div class="meta"><span class="num">3</span><span>희망 직무</span></div></div>
        <div class="pill"><div class="bar"></div><div class="meta"><span class="num">4</span><span>둘러보기</span></div></div>
      </div>
    </div>
    <div>
      <span class="lbl">VERTICAL · APPLICATION STAGES</span>
      <div class="step-v">
        <div class="item done"><span class="dot"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></span><div><span class="label">서류 제출</span><span class="sub">2026.05.02 · 통과</span></div></div>
        <div class="item done"><span class="dot"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></span><div><span class="label">코딩 테스트</span><span class="sub">2026.05.08 · 통과</span></div></div>
        <div class="item active"><span class="dot">3</span><div><span class="label">1차 면접</span><span class="sub">D-2 · 2026.05.10 14:00</span></div></div>
        <div class="item muted"><span class="dot">4</span><div><span class="label">2차 면접</span></div></div>
        <div class="item muted"><span class="dot">5</span><div><span class="label">처우 협의</span></div></div>
      </div>
    </div>
  </div>
</body></html>
