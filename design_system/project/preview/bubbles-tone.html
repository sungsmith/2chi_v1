<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .col h5 { font-family: var(--font-family-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; margin: 0 0 8px; color: var(--color-text-muted); }
  .bubble { display: inline-block; padding: 11px 14px; border-radius: 14px; border: 1px solid; font-size: 13px; line-height: 1.5; max-width: 300px; }
  .bubble .speaker { font-family: var(--font-family-mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; display: block; opacity: 0.7; }
  .bubble.bad  { background: var(--color-semantic-error-bg); border-color: #FBC7CD; color: var(--color-semantic-error); }
  .bubble.good { background: var(--color-mint-50); border-color: var(--color-mint-200); color: var(--color-text-primary); }
  .col.do  h5 { color: var(--color-mint-700); }
  .col.dont h5 { color: var(--color-semantic-error); }
</style></head>
<body>
  <div class="grid">
    <div class="col dont">
      <h5>✗ BEFORE</h5>
      <div class="bubble bad">
        <span class="speaker">자소서 결과 화면</span>
        오류: 사용자 이력에 없는 정보가 포함됨. 자동 생성된 자소서를 신뢰할 수 없습니다.
      </div>
    </div>
    <div class="col do">
      <h5>✓ AFTER</h5>
      <div class="bubble good">
        <span class="speaker">자소서 결과 화면</span>
        AI가 작성한 표현 중 <b>3곳</b>이 내 이력에서 직접 확인되지 않았어요. 검토해보고 그대로 둘지, 다시 쓸지 정해주세요.
      </div>
    </div>
  </div>
</body></html>
