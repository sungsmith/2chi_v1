<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px; background: var(--color-bg); }
  .stage { display: grid; grid-template-columns: 220px 1fr; gap: 16px; align-items: flex-start; }

  /* Trigger input + selected range pill */
  .trigger { display: flex; flex-direction: column; gap: 8px; }
  .trigger .lbl { font-size: 12px; font-weight: 600; color: var(--color-text-secondary); }
  .trigger .input {
    display: inline-flex; align-items: center; gap: 8px;
    height: 38px; padding: 0 10px;
    border: 1px solid var(--color-border-strong); border-radius: 10px;
    background: #fff; font-family: var(--font-family-mono); font-size: 12.5px; color: var(--color-text-primary);
  }
  .trigger .input .ico { color: var(--color-text-muted); display: inline-flex; }
  .preset { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
  .preset button {
    text-align: left; padding: 6px 10px; border-radius: 6px;
    background: transparent; border: none; cursor: pointer;
    font-size: 12px; color: var(--color-text-secondary); font-family: inherit;
  }
  .preset button:hover { background: var(--color-surface-soft); color: var(--color-text-primary); }
  .preset button.active { background: var(--color-primary-50); color: var(--color-primary-700); font-weight: 700; }

  /* Calendar grid */
  .cal {
    background: #fff; border: 1px solid var(--color-border-default); border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 12px 28px -8px rgba(37,36,31,0.10);
  }
  .cal-head { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 700; }
  .cal-head .nav { display: inline-flex; gap: 4px; }
  .cal-head .nav button { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--color-border-default); background: #fff; cursor: pointer; color: var(--color-text-secondary); display: grid; place-items: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-top: 10px; font-family: var(--font-family-mono); font-size: 11.5px; }
  .cal-grid .dow { text-align: center; padding: 6px 0; color: var(--color-text-muted); font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }
  .cal-grid .dow.sun { color: var(--color-pink-400); }
  .cal-grid .d {
    aspect-ratio: 1; display: grid; place-items: center;
    border-radius: 6px; cursor: pointer; color: var(--color-text-primary);
    position: relative;
  }
  .cal-grid .d.mute { color: var(--color-text-disabled); }
  .cal-grid .d:hover { background: var(--color-surface-soft); }
  .cal-grid .d.range { background: var(--color-primary-50); color: var(--color-primary-700); border-radius: 0; }
  .cal-grid .d.start { background: var(--color-primary-600); color: #fff; border-radius: 6px 0 0 6px; font-weight: 700; }
  .cal-grid .d.end   { background: var(--color-primary-600); color: #fff; border-radius: 0 6px 6px 0; font-weight: 700; }
  .cal-grid .d.today::after { content: ""; position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--color-pink-400); border-radius: 50%; }
</style></head>
<body>
  <div class="stage">
    <div class="trigger">
      <span class="lbl">지원 기간</span>
      <span class="input">
        <span class="ico">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </span>
        2026.05.08 – 05.22
      </span>
      <div class="preset">
        <button>오늘</button>
        <button class="active">지난 2주</button>
        <button>이번 달</button>
        <button>지난 90일</button>
        <button>전체 기간</button>
      </div>
    </div>

    <div class="cal">
      <div class="cal-head">
        <span>2026년 5월</span>
        <span class="nav">
          <button aria-label="이전 달"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button aria-label="다음 달"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg></button>
        </span>
      </div>
      <div class="cal-grid">
        <span class="dow sun">일</span><span class="dow">월</span><span class="dow">화</span><span class="dow">수</span><span class="dow">목</span><span class="dow">금</span><span class="dow">토</span>
        <span class="d mute">26</span><span class="d mute">27</span><span class="d mute">28</span><span class="d mute">29</span><span class="d mute">30</span><span class="d">1</span><span class="d">2</span>
        <span class="d">3</span><span class="d">4</span><span class="d">5</span><span class="d">6</span><span class="d">7</span><span class="d start">8</span><span class="d range">9</span>
        <span class="d range">10</span><span class="d range">11</span><span class="d range">12</span><span class="d range">13</span><span class="d range">14</span><span class="d range">15</span><span class="d range">16</span>
        <span class="d range">17</span><span class="d range">18</span><span class="d range">19</span><span class="d range">20</span><span class="d range">21</span><span class="d end today">22</span><span class="d">23</span>
        <span class="d">24</span><span class="d">25</span><span class="d">26</span><span class="d">27</span><span class="d">28</span><span class="d">29</span><span class="d">30</span>
      </div>
    </div>
  </div>
</body></html>
