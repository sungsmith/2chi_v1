<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px; }
  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .nm { font-family: var(--font-family-mono); font-size: 12px; font-weight: 700; }
  .hint { font-size: 11px; color: var(--color-text-muted); }
  .scale { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--color-border-default); }
  .sw { height: 62px; padding: 6px 7px; font-family: var(--font-family-mono); font-size: 9px; display: flex; flex-direction: column; justify-content: space-between; }
  .sw .step { font-weight: 700; font-size: 10px; }
  .sw .hex  { opacity: 0.7; font-size: 8.5px; }
</style></head>
<body>
  <div class="head"><span class="nm">lavender · AI / analysis</span><span class="hint">AI 초안 · 매칭 분석 · 마스코트</span></div>
  <div class="scale">
    <div class="sw" style="background:#F6F3FE"><span class="step">50</span><span class="hex">F6F3FE</span></div>
    <div class="sw" style="background:#ECE5FD"><span class="step">100</span><span class="hex">ECE5FD</span></div>
    <div class="sw" style="background:#D8CBFA"><span class="step">200</span><span class="hex">D8CBFA</span></div>
    <div class="sw" style="background:#BCA8F4"><span class="step">300</span><span class="hex">BCA8F4</span></div>
    <div class="sw" style="background:#9F84EA;color:#fff"><span class="step">400</span><span class="hex">9F84EA</span></div>
    <div class="sw" style="background:#8265DC;color:#fff"><span class="step">500</span><span class="hex">8265DC</span></div>
    <div class="sw" style="background:#6A4DC2;color:#fff"><span class="step">600</span><span class="hex">6A4DC2</span></div>
  </div>
</body></html>
