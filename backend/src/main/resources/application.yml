spring:
  application:
    name: twochi
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:twochi}
    username: ${DB_USER:twochi}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:changeme}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.twochi: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-min-32-bytes-please-1234}
    access-token-ttl: PT30M
  refresh:
    cookie-name: refresh_token
    cookie-secure: ${COOKIE_SECURE:false}
    cookie-path: /api/v1/auth
    ttl: P14D
